# HelixBench — Cloudflare Worker + static assets + KV cache
name = "helixbench"
main = "src/worker.js"
compatibility_date = "2024-12-01"
workers_dev = true

# Static frontend (populated by: npm run prepare-assets)
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "HELIX_CACHE"
id = "46dca5ab4e0c438799ab6ca1d15f3ef4"
# Optional for `wrangler dev`:
# preview_id = "paste_preview_id_here"

[vars]
LLM_BASE_URL = "https://openrouter.ai/api/v1"
LLM_MODEL = "openai/gpt-4o-mini"
CACHE_TTL_SECONDS = "86400"
OPENROUTER_APP_NAME = "HelixBench"

# Secrets (set via CLI, do not commit):
#   npx wrangler secret put LLM_API_KEY
# Optional: users can still paste a key in the UI (sent as X-LLM-API-Key).
