# HelixBench — Cloudflare Worker + static assets (+ optional KV cache)
name = "helixbench"
main = "src/worker.js"
compatibility_date = "2024-12-01"
workers_dev = true

# Static frontend (populated by: npm run prepare-assets)
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# --- Optional shared edge cache (KV) ---
# Deploy works WITHOUT this. Browser localStorage still caches modules.
# To enable KV:
#   1. npx wrangler kv namespace create HELIX_CACHE
#   2. npx wrangler kv namespace create HELIX_CACHE --preview
#   3. Uncomment below and paste the real ids (not REPLACE_...)
#
# [[kv_namespaces]]
# binding = "HELIX_CACHE"
# id = "your_production_kv_id"
# preview_id = "your_preview_kv_id"

[vars]
LLM_BASE_URL = "https://openrouter.ai/api/v1"
LLM_MODEL = "openai/gpt-4o-mini"
CACHE_TTL_SECONDS = "86400"
OPENROUTER_APP_NAME = "HelixBench"

# Secrets (set via CLI, do not commit):
#   npx wrangler secret put LLM_API_KEY
# Optional: users can still paste a key in the UI (sent as X-LLM-API-Key).
